<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Cover Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background-color: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.08); width: 100%; max-width: 550px; margin-bottom: 20px; }
        h2 { margin-top: 0; color: #1a1a1a; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; }
        input[type="text"], input[type="number"], input[type="file"] { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 6px; box-sizing: border-box; transition: border-color 0.2s; }
        input:focus { border-color: #007bff; outline: none; }
        button { width: 100%; padding: 12px; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.2s; }
        .btn-generate { background-color: #28a745; }
        .btn-generate:hover { background-color: #218838; }
        .btn-scan { background-color: #007bff; }
        .btn-scan:hover { background-color: #0069d9; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #result, #scanResult { margin-top: 20px; padding: 15px; background-color: #f8f9fa; border-left: 4px solid #007bff; border-radius: 4px; display: none; }
        .score-item { display: inline-block; background: #e9ecef; padding: 5px 10px; margin: 5px; border-radius: 15px; font-size: 0.9em; }
        .section-divider { margin: 30px 0; border-top: 1px dashed #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h2>1. Generate Exam Template</h2>
    <form id="examForm">
        <div class="form-group">
            <label for="course_code">Course Code</label>
            <input type="text" id="course_code" name="course_code" placeholder="e.g., PHY6202" required>
        </div>
        <div class="form-group">
            <label for="course_name">Course Name</label>
            <input type="text" id="course_name" name="course_name" placeholder="e.g., Advanced Physics" required>
        </div>
        <div class="form-group">
            <label for="instructor_name">Instructor Name</label>
            <input type="text" id="instructor_name" name="instructor_name" placeholder="e.g., Dr. Smith" required>
        </div>
        <div class="form-group">
            <label for="question_count">Question Count (Max 20)</label>
            <input type="number" id="question_count" name="question_count" min="1" max="20" value="10" required>
        </div>
        <button type="submit" id="submitBtn" class="btn-generate">Generate & Download PDF</button>
    </form>

    <div id="result">
        <strong>Status:</strong> <span id="statusText"></span><br>
        <strong>Exam ID:</strong> <span id="examIdText" style="font-family: monospace; background: #eee; padding: 2px 5px;"></span>
        <p style="font-size: 0.85em; color: #666;">Copy this ID to use in the scanning step below.</p>
    </div>
</div>

<div class="container">
    <h2>2. Scan Filled Paper</h2>
    <form id="scanForm">
        <div class="form-group">
            <label for="scan_exam_id">Exam ID</label>
            <input type="text" id="scan_exam_id" name="exam_id" placeholder="Paste the Exam ID here" required>
        </div>
        <div class="form-group">
            <label for="paper_file">Upload Scanned Image (JPG/PNG)</label>
            <input type="file" id="paper_file" name="file" accept="image/*" required>
        </div>
        <button type="submit" id="scanBtn" class="btn-scan">Scan & Process Paper</button>
    </form>

    <div id="scanResult">
        <h3 style="margin-top: 0;">Scan Results</h3>
        <p><strong>Student ID:</strong> <span id="resStudentId" style="font-size: 1.2em; color: #007bff; font-weight: bold;"></span></p>
        <strong>Scores:</strong>
        <div id="resScores"></div>
    </div>
</div>

<script>
    // --- GENERATION LOGIC ---
    document.getElementById('examForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        const resultDiv = document.getElementById('result');
        const statusText = document.getElementById('statusText');
        const examIdText = document.getElementById('examIdText');
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Generating...';
        resultDiv.style.display = 'none';

        const payload = {
            course_code: document.getElementById('course_code').value,
            course_name: document.getElementById('course_name').value,
            instructor_name: document.getElementById('instructor_name').value,
            question_count: parseInt(document.getElementById('question_count').value)
        };

        try {
            const response = await fetch('/api/generate-cover', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!response.ok) { throw new Error(`Server error: ${response.statusText}`); }
            const data = await response.json();

            // Download PDF
            const byteCharacters = atob(data.pdf_base64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) { byteNumbers[i] = byteCharacters.charCodeAt(i); }
            const byteArray = new Uint8Array(byteNumbers);
            const blob = new Blob([byteArray], {type: 'application/pdf'});
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = `${data.exam_id}_cover.pdf`;
            link.click();

            // Update UI
            statusText.textContent = 'Success! PDF Downloaded.';
            statusText.style.color = 'green';
            examIdText.textContent = data.exam_id;
            document.getElementById('scan_exam_id').value = data.exam_id; // Auto-fill scan ID
            resultDiv.style.display = 'block';
        } catch (error) {
            statusText.textContent = `Failed: ${error.message}`;
            statusText.style.color = 'red';
            resultDiv.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Generate & Download PDF';
        }
    });

    // --- SCANNING LOGIC ---
    document.getElementById('scanForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const scanBtn = document.getElementById('scanBtn');
        const scanResultDiv = document.getElementById('scanResult');
        const resStudentId = document.getElementById('resStudentId');
        const resScores = document.getElementById('resScores');
        
        const examId = document.getElementById('scan_exam_id').value;
        const fileInput = document.getElementById('paper_file');
        
        if (!fileInput.files[0]) return;

        scanBtn.disabled = true;
        scanBtn.textContent = 'Processing Paper (Wait)...';
        scanResultDiv.style.display = 'none';
        resScores.innerHTML = '';

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        try {
            const response = await fetch(`/api/scan-paper?exam_id=${examId}`, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) { 
                const errData = await response.json();
                throw new Error(errData.detail || 'Processing failed'); 
            }

            const data = await response.json();
            
            // Display Results
            resStudentId.textContent = data.student_id;
            data.scores.forEach(s => {
                const span = document.createElement('span');
                span.className = 'score-item';
                span.innerHTML = `<strong>Q${s.question}:</strong> ${s.score}`;
                resScores.appendChild(span);
            });
            
            scanResultDiv.style.display = 'block';
            scanResultDiv.style.borderLeftColor = '#28a745';
        } catch (error) {
            alert(`Error: ${error.message}`);
        } finally {
            scanBtn.disabled = false;
            scanBtn.textContent = 'Scan & Process Paper';
        }
    });
</script>

</body>
</html>
