<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Cover Generator</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { margin-top: 0; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #a0c4ff; cursor: not-allowed; }
        #result { margin-top: 20px; padding: 15px; background-color: #e9ecef; border-radius: 4px; display: none; word-wrap: break-word; }
    </style>
</head>
<body>

<div class="container">
    <h2>Generate Exam Cover</h2>
    <form id="examForm">
        <div class="form-group">
            <label for="course_code">Course Code</label>
            <input type="text" id="course_code" name="course_code" placeholder="e.g., PHY6202" required>
        </div>
        <div class="form-group">
            <label for="course_name">Course Name</label>
            <input type="text" id="course_name" name="course_name" placeholder="e.g., Advanced Physics" required>
        </div>
        <div class="form-group">
            <label for="instructor_name">Instructor Name</label>
            <input type="text" id="instructor_name" name="instructor_name" placeholder="e.g., Dr. Smith" required>
        </div>
        <div class="form-group">
            <label for="question_count">Question Count (Max 20)</label>
            <input type="number" id="question_count" name="question_count" min="1" max="20" value="10" required>
        </div>
        <button type="submit" id="submitBtn">Generate & Download PDF</button>
    </form>

    <div id="result">
        <strong>Status:</strong> <span id="statusText"></span><br>
        <strong>Exam ID:</strong> <span id="examIdText"></span><br>
        <p style="font-size: 0.9em; color: #666;">Check browser console for full layout data.</p>
    </div>
</div>

<script>
    document.getElementById('examForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const resultDiv = document.getElementById('result');
        const statusText = document.getElementById('statusText');
        const examIdText = document.getElementById('examIdText');
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Generating...';
        resultDiv.style.display = 'none';

        const payload = {
            course_code: document.getElementById('course_code').value,
            course_name: document.getElementById('course_name').value,
            instructor_name: document.getElementById('instructor_name').value,
            question_count: parseInt(document.getElementById('question_count').value)
        };

        try {
            const response = await fetch('/api/generate-cover', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) { throw new Error(`Server error: ${response.statusText}`); }

            const data = await response.json();
            console.log("Layout Data (Top-Left Coordinates):", data.layout_data);

            // Convert Base64 to Blob and trigger download
            const byteCharacters = atob(data.pdf_base64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            const blob = new Blob([byteArray], {type: 'application/pdf'});
            
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = `${data.exam_id}_cover.pdf`;
            link.click();

            // Update UI
            statusText.textContent = 'Success! PDF Downloaded.';
            statusText.style.color = 'green';
            examIdText.textContent = data.exam_id;
            resultDiv.style.display = 'block';

        } catch (error) {
            console.error('Error:', error);
            statusText.textContent = `Failed: ${error.message}`;
            statusText.style.color = 'red';
            examIdText.textContent = 'N/A';
            resultDiv.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Generate & Download PDF';
        }
    });
</script>

</body>
</html>
